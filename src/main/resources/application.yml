spring:
  application:
    name: FlowGuard

  # PostgreSQL
  datasource:
    url: jdbc:postgresql://localhost:5432/apiGateway&RateLimiterSAAS
    username: postgres
    password: vaibhava2804
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  # Redis
  data:
    redis:
      host: localhost
      port: 6379
      # password: yourpassword   # uncomment for Upstash

# Rate Limiter config
# Switch algorithm here: FIXED_WINDOW | TOKEN_BUCKET | LEAKY_BUCKET
rate-limiter:
  algorithm: TOKEN_BUCKET
  window-seconds: 60

server:
  port: 8080